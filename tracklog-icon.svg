<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#tl-bg)"/>
  <!-- Pulse rings (GPS signal) -->
  <circle cx="50" cy="44" r="36" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
  <circle cx="50" cy="44" r="27" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Map pin: circle -->
  <circle cx="50" cy="35" r="18" fill="white"/>
  <!-- Pin inner dot -->
  <circle cx="50" cy="35" r="8" fill="#2563eb"/>
  <!-- Pin tail (overlapping circle at bottom for seamless join) -->
  <polygon points="38,48 50,76 62,48" fill="white"/>
  <ellipse cx="50" cy="49" rx="12" ry="4" fill="white"/>
</svg>
